{% set version = "0.3.7" %}

package:
  name: srtm.py
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/S/SRTM.py/SRTM.py-{{ version }}.tar.gz
  sha256: 38c8ba9900751cdc9e7f6d91af1a339cc4a8e2fcb7482c6d613fd3dc6c5d8c4c

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - requests
    - gpxpy

test:
  imports:
    - srtm
  commands:
    - pip check
    - gpxelevations -h
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tkrajina/srtm.py
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Python parser for the Shuttle Radar Topography Mission elevation data

extra:
  recipe-maintainers:
    - ocefpaf
